name: Build & Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
          - none

permissions:
  contents: write

jobs:
  build_wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zig
        if: runner.os != 'Linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache cibuildwheel
        if: runner.os != 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/cibuildwheel
            ~/AppData/Local/pypa/cibuildwheel/Cache
          key: cibw-${{ runner.os }}-${{ hashFiles('python/pyproject.toml') }}
          restore-keys: cibw-${{ runner.os }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        with:
          package-dir: python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source dist
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist
        working-directory: python
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  build_cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            binary: ztraj
          - os: ubuntu-24.04-arm
            target: linux-aarch64
            binary: ztraj
          - os: macos-15-intel
            target: macos-x86_64
            binary: ztraj
          - os: macos-latest
            target: macos-aarch64
            binary: ztraj
          - os: windows-latest
            target: windows-x86_64
            binary: ztraj.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build CLI
        run: zig build -Doptimize=ReleaseFast

      - name: Smoke test
        shell: bash
        run: ./zig-out/bin/${{ matrix.binary }} --version

      - name: Package binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET_NAME="ztraj-${VERSION}-${{ matrix.target }}"
          mkdir -p dist
          if [ "${{ matrix.target }}" = "windows-x86_64" ]; then
            cp "zig-out/bin/${{ matrix.binary }}" "dist/${ASSET_NAME}.exe"
          else
            cp "zig-out/bin/${{ matrix.binary }}" "dist/${ASSET_NAME}"
            chmod +x "dist/${ASSET_NAME}"
          fi

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/ztraj-*

  publish:
    name: Publish
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.target != 'none')
    permissions:
      id-token: write
    environment:
      name: ${{ github.event_name == 'push' && 'pypi' || inputs.target }}
      url: ${{ (github.event_name == 'push' || inputs.target == 'pypi') && 'https://pypi.org/p/pyztraj' || 'https://test.pypi.org/p/pyztraj' }}

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          pattern: sdist
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -la dist/

      - name: Publish to PyPI
        if: github.event_name == 'push' || inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: dist/

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/

  github_release:
    name: GitHub Release
    needs: [publish, build_cli]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate CLI checksums
        run: |
          cd dist
          sha256sum ztraj-*-linux-* ztraj-*-macos-* ztraj-*-windows-* > SHA256SUMS 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
